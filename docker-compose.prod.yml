services:
  postgres:
    image: postgres:14-alpine
    container_name: hms-db
    environment:
      POSTGRES_USER: ${DB_USER:-hms}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-hms_db}
    volumes:
      - hms_postgres_data:/var/lib/postgresql/data
    networks:
      - hms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: gimmi17/hms-backend:latest
    container_name: hms-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-hms}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/${DB_NAME:-hms_db}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}
      REFRESH_TOKEN_EXPIRATION: ${REFRESH_TOKEN_EXPIRATION:-604800}
      PYTHONUNBUFFERED: "1"
    ports:
      - "8847:8000"
    volumes:
      - hms_receipts_data:/app/data/receipts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hms-network
    restart: unless-stopped

  frontend:
    image: gimmi17/hms-frontend:latest
    container_name: hms-frontend
    ports:
      - "5052:3000"
    depends_on:
      - backend
    networks:
      - hms-network
    restart: unless-stopped

volumes:
  hms_postgres_data:
  hms_receipts_data:

networks:
  hms-network:
    driver: bridge
